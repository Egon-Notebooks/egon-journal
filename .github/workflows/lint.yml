name: Lint

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dev dependencies
        run: uv sync --extra dev

      - name: Run ruff (lint)
        run: uv run ruff check egon/ tests/

      - name: Run ruff (format check)
        run: uv run ruff format --check egon/ tests/
